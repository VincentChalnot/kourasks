  - id: mail-gameover-projects
    name: "C'est terminé"
    description: |
      <p>Trois projets annulés. TROIS.</p>
      <p>J'ai pris une décision difficile. L'infrastructure sera externalisée.</p>
      <p>J'ai signé un contrat avec une ESN. Offshore. Madagascar. 6 ingénieurs à 800€/mois chacun.</p>
      <p>Ils commencent lundi. Votre dernier jour est vendredi.</p>
      <p>Merci pour votre service. Les RH vous contacteront pour la procédure.</p>
      <p>PS : Le site de ma fille est down depuis ce matin. Vous pouvez le réparer avant de partir ?</p>
      <p class="mail-signature">— Jean-Michel Kouratec<br>CEO, KouraTech Industries</p>
    from: "Jean-Michel Kouratec <jm@kouratech.com>"
    unlockAtEvent: game_over_projects
    options:
      - id: projects-gameover-lettre
        name: "Ah d'accord, vous pouvez m'écrire une lettre de recommandation ?"
        eventId: request_recommendation_letter
        description: "Lettre de recommandation, pour survivre à Madagascar."

  - id: mail-endgame-victory
    name: "🏆 Nous sommes arrivés au sommet"
    description: |
      <p>50 millions de Kouraks. 10 projets en production. Une infra qui tient debout. La plupart du temps.</p>
      <p>J'ai une annonce à faire : KouraTech est racheté.</p>
      <p>Un GAFAM dont je ne peux pas divulguer le nom. Montant : 500 millions d'euros. Cash.</p>
      <p>Vous avez bossé dur. L'infra a tenu. Malgré les crashes. Les migrations. Les nuits blanches. Les bugs en prod.</p>
      <p>Vous recevrez une prime de 10 000€ et un MacBook Pro gravé "KouraTech 2024".</p>
      <p>Félicitations. On a gagné. Enfin... surtout moi. Mais vous aussi un peu.</p>
      <p class="mail-signature">— Jean-Michel Kouratec<br>Ex-CEO, KouraTech Industries (acquired)</p>
    from: "Jean-Michel Kouratec <jm@kouratech.com>"
    unlockAtTrimester: 20.0
    options:
      - id: victory-lettre
        name: "Ah d'accord, vous pouvez m'écrire une lettre de recommandation ?"
        eventId: request_recommendation_letter
        description: "Lettre de recommandation, pour survivre à Madagascar."

  - id: mail-recommendation-letter
    name: "Merci d'avoir joué !"
    description: |
      <p>J'espère que ce jeu vous a amusé et qu'il vous a laissé un goût amer en bouche.</p>
      <p>La prochaine fois que vous travaillez sur une stack technique improbable, vous penserez à moi.</p>
      <p>N'hésitez pas à partager ce jeu avec vos collègues.</p>
      <p class="mail-signature">— Vincent Chalnot</p>
    from: "Vincent Chalnot"
    unlockAtEvent: request_recommendation_letter
    options:
      - id: reset-game
        name: "Recommencer une nouvelle partie"
        eventId: game_reset
        description: "Nouvelle partie, nouveaux bugs, même JM."

  # ==========================================
  # Pause Café
  # ==========================================

  - id: mail-pause-cafe
    name: "☕ C'est l'heure de la pause café !"
    description: |
      <p>Eh oui, même un développeur a besoin de faire une pause !</p>
      <p>Le café est prêt. La machine à espresso du bureau fait enfin funcionar. Bernard est en train de discuter de ses scores de golf au niveau de la machine.</p>
      <p>C'est l'occasion de prendre un peu de recul. Respirez. Regardez votre écran. Vous êtes sûr de vouloir continuer ?</p>
      <p>Sinon, on peut aussi discuter de la dernière fois où le serveur a crashé en pleine nuit...</p>
      <p class="mail-signature">— Le Syndicaliste Dev</p>
    from: "Le Syndicaliste Dev <syndic@KouraTech.com>"
    unlockAtEvent: pause_game
    options:
      - id: pause-resume
        name: "Reprendre le travail"
        description: "Retour au travail, le café attendra."
      - id: pause-restart
        name: "Recommencer la partie"
        eventId: game_reset
        description: "Tout recommencer depuis le début."

# Notes de conception:
# - Mails liés aux événements via unlockAtEvent (eventId des projets)
# - Progression narrative humoristique
# - Zero kouraks system: 3 mails progressifs (warning → consultant → game over)
# - Strikes: 1 mail par strike, 3 strikes = projet failed
# - Milestones positifs pour récompenser le joueur
# - Mail de fin (victoire) quand on atteint le sommet
# - Options vides = modal bloquante (game over ou victoire)
# - Tone satirique constant sur la tech et le management
