# KOURAKS - Configuration Mails
# Emails narratifs liés aux événements du jeu
# Les mails bloquent le jeu et nécessitent une réponse

mails:
  # ==========================================
  # Mails de lancement de projets
  # ==========================================

  - id: mail-welcome
    name: "Bienvenue chez KouraTech"
    description: |
      <p>Bienvenue dans l'équipe infrastructure !</p>
      <p>Je suis ravi de vous compter parmi nous. Votre mission est simple : faire tourner notre site vitrine.</p>
      <p>J'ai récupéré un vieux serveur dans le couloir. Le BIOS date de 1994 mais il marche encore. C'est tout ce qu'on a pour l'instant.</p>
      <p>Faites de votre mieux. L'avenir de l'entreprise en dépend. Enfin... mon site web surtout.</p>
      <p class="mail-signature">— Jean-Michel Kouratec, PDG</p>
    from: "Jean-Michel Kouratec <jm@kouratech.com>"
    unlockAtTrimester: 0
    options:
      - id: welcome-ok
        name: "Compris, je m'y mets"
        description: "Ai-je vraiment le choix ?"

  - id: mail-site-v1-launched
    name: "Le site est en ligne !"
    description: |
      <p>Excellent travail !</p>
      <p>Le site est en ligne. Ma fille a déjà commenté sur Instagram. 47 vues en 3 heures. On est viraux.</p>
      <p>J'ai eu une idée : et si on ajoutait un compteur de visites en temps réel ? Les gens adorent voir que d'autres gens regardent.</p>
      <p>Préparez-vous à scaler. J'ai commandé 500 cartes de visite avec l'URL.</p>
      <p class="mail-signature">— JM</p>
    from: "Jean-Michel Kouratec <jm@kouratech.com>"
    unlockAtEvent: site-vitrine-v1-launched
    options:
      - id: site-v1-ok
        name: "On va gérer"
        description: "J'espère que vous avez un plan B pour le serveur."

  - id: mail-forum-launch
    name: "Nouveau projet : Forum Community"
    description: |
      <p>J'ai rencontré Bernard au golf. Il m'a parlé des forums phpBB.</p>
      <p>Apparemment, c'est l'avenir de la communication en ligne. Je veux le même.</p>
      <p>Budget : 800K. Timeline : avant la fin du trimestre. Questions : aucune.</p>
      <p>Ah, et gardez le site vitrine en ligne. Ma fille check toujours les stats.</p>
      <p class="mail-signature">— JM</p>
    from: "Jean-Michel Kouratec <jm@kouratech.com>"
    unlockAtEvent: site-vitrine-v15-launched
    options:
      - id: forum-ok
        name: "C'est parti"
        description: "Bernard attend le forum pour poster ses scores de golf."

  - id: mail-ecommerce-launch
    name: "On se lance dans l'e-commerce"
    description: |
      <p>Amazon gagne des milliards. On va faire pareil.</p>
      <p>J'ai acheté un stock de 5 000 porte-clés USB personnalisés KouraTech. Il faut les vendre. Vite.</p>
      <p>Créez une boutique en ligne. Paiement CB. Tunnel de conversion optimisé. J'ai lu un article sur le growth hacking.</p>
      <p>Les porte-clés sont dans mon garage. Livraison sous 6 semaines.</p>
      <p class="mail-signature">— JM</p>
    from: "Jean-Michel Kouratec <jm@kouratech.com>"
    unlockAtEvent: forum-v1-launched
    options:
      - id: ecommerce-ok
        name: "On va vendre ces porte-clés"
        description: "La femme de JM veut récupérer son garage. Vite."

  - id: mail-saas-launch
    name: "L'ère du SaaS"
    description: |
      <p>Les investisseurs ne parlent que de SaaS. Recurring revenue. ARR. MRR. J'ai fait un PowerPoint.</p>
      <p>On va créer un outil de gestion de projet. Comme Jira, mais en mieux. Ou en moins bien, on verra.</p>
      <p>Budget : 3M de K. C'est un investissement stratégique. Le business plan prévoit la rentabilité au Q47.</p>
      <p class="mail-signature">— JM</p>
    from: "Jean-Michel Kouratec <jm@kouratech.com>"
    unlockAtEvent: ecommerce-v1-launched
    options:
      - id: saas-ok
        name: "Le SaaS, c'est l'avenir"
        description: "Q47, c'est dans combien d'années déjà ?"

  - id: mail-mobile-launch
    name: "Mobile First"
    description: |
      <p>Tout le monde est sur mobile maintenant. Mon petit-fils ne quitte pas son iPhone.</p>
      <p>On lance une app. iOS et Android. Backend API RESTful. J'ai lu la doc Swagger.</p>
      <p>L'app permet de... on décidera plus tard. L'important c'est d'être sur mobile.</p>
      <p>Budget : 5M. Timeline : hier.</p>
      <p class="mail-signature">— JM</p>
    from: "Jean-Michel Kouratec <jm@kouratech.com>"
    unlockAtEvent: saas-v1-launched
    options:
      - id: mobile-ok
        name: "Mobile first, c'est noté"
        description: "L'app sera prête avant que JM change d'avis."

  - id: mail-streaming-launch
    name: "Netflix mais en mieux"
    description: |
      <p>J'ai regardé un documentaire sur Netflix hier soir. Leur infra est impressionnante.</p>
      <p>On va faire une plateforme de VOD. J'ai acheté les droits de 3 films d'auteur que personne ne connaît. 200€ le lot.</p>
      <p>Prévoyez large pour le CDN. Les vidéos font 4K. J'ai pas encore compris ce que c'est mais ça fait pro.</p>
      <p class="mail-signature">— JM</p>
    from: "Jean-Michel Kouratec <jm@kouratech.com>"
    unlockAtEvent: streaming-v1-launched
    options:
      - id: streaming-ok
        name: "On va streamer"
        description: "3 films d'auteur, 4K, 0 spectateurs."

  - id: mail-fintech-launch
    name: "La finance, c'est lucratif"
    description: |
      <p>Les fintech lèvent des centaines de millions. On va faire un payment gateway.</p>
      <p>PCI-DSS compliant. Chiffrement end-to-end. Audit de sécurité. J'ai imprimé un PDF sur la cryptographie, c'est fascinant.</p>
      <p>Budget illimité. C'est stratégique. Les cartes bancaires c'est l'avenir.</p>
      <p>Ah oui, et il faut que ça marche 24/7. Les gens payent la nuit aussi apparemment.</p>
      <p class="mail-signature">— JM</p>
    from: "Jean-Michel Kouratec <jm@kouratech.com>"
    unlockAtEvent: fintech-v1-launched
    options:
      - id: fintech-ok
        name: "On va gérer l'argent des gens"
        description: "La nuit, les gens payent. Surtout les hackers."

  - id: mail-iot-launch
    name: "L'Internet des Objets"
    description: |
      <p>IoT. Internet of Things. J'ai vu ça au CES de Las Vegas.</p>
      <p>On va collecter des données de capteurs. 10 000 capteurs. Peut-être plus. Les données arrivent en temps réel.</p>
      <p>Je ne sais pas encore ce qu'on va mesurer, mais les données c'est le pétrole du 21ème siècle. J'ai lu ça dans Les Échos.</p>
      <p>Kafka. ClickHouse. Time series. Mettez tout ça en place.</p>
      <p class="mail-signature">— JM</p>
    from: "Jean-Michel Kouratec <jm@kouratech.com>"
    unlockAtEvent: iot-v1-launched
    options:
      - id: iot-ok
        name: "IoT, c'est parti"
        description: "10 000 capteurs, 0 idée de ce qu'ils mesurent."

  - id: mail-social-launch
    name: "Le réseau social du futur"
    description: |
      <p>Twitter c'est fini. Facebook c'est has-been. On va créer LE réseau social de demain.</p>
      <p>Posts. Likes. Retweets. Stories. Reels. J'ai une liste de 47 features. Toutes prioritaires.</p>
      <p>Budget : 15M. Les VC adorent les réseaux sociaux. On lèvera une série A au T12.</p>
      <p>L'algorithme ? On verra plus tard. Pour l'instant il faut que ça scale.</p>
      <p class="mail-signature">— JM</p>
    from: "Jean-Michel Kouratec <jm@kouratech.com>"
    unlockAtEvent: social-v1-launched
    options:
      - id: social-ok
        name: "Le prochain Facebook"
        description: "47 features, aucune idée de l'algo."

  - id: mail-aiml-launch
    name: "L'Intelligence Artificielle"
    description: |
      <p>L'IA va changer le monde. ChatGPT. Midjourney. Stable Diffusion. J'ai tout testé.</p>
      <p>On va créer une plateforme ML. Entraînement de modèles. Inférence. APIs. Vector DB pour le RAG.</p>
      <p>Je ne sais pas ce que c'est le RAG, mais c'est dans tous les pitchs deck que je reçois.</p>
      <p>Budget : 30M. C'est l'avenir. Peut-être.</p>
      <p class="mail-signature">— JM</p>
    from: "Jean-Michel Kouratec <jm@kouratech.com>"
    unlockAtEvent: aiml-v1-launched
    options:
      - id: aiml-ok
        name: "L'IA c'est l'avenir"
        description: "RAG, ML, IA... et JM."

  # ==========================================
  # Mails de migration forcée
  # ==========================================

  - id: mail-site-upgrade
    name: "Le site est trop lent"
    description: |
      <p>Ma fille s'est plainte. Le site met 8 secondes à charger.</p>
      <p>Il faut un reverse proxy. Nginx. HAProxy. Je ne sais pas. Choisissez.</p>
      <p>Vous avez 2 heures. Elle veut poster sur Instagram à 18h.</p>
      <p class="mail-signature">— JM</p>
    from: "Jean-Michel Kouratec <jm@kouratech.com>"
    unlockAtEvent: site-vitrine-v15-launched
    options:
      - id: site-upgrade-ok
        name: "On upgrade"
        description: "Reverse proxy, reverse psychologie."

  - id: mail-forum-spam
    name: "Le forum est envahi de spam"
    description: |
      <p>3 847 messages de spam. En une nuit. Des bots russes. Des liens vers des sites douteux.</p>
      <p>Il faut un système de modération. Des filtres. Un CAPTCHA. Un storage pour les pièces jointes.</p>
      <p>Bernard m'a appelé ce matin. Il n'est pas content. C'est votre faute apparemment.</p>
      <p class="mail-signature">— JM</p>
    from: "Jean-Michel Kouratec <jm@kouratech.com>"
    unlockAtEvent: forum-v2-launched
    options:
      - id: forum-upgrade-ok
        name: "On combat le spam"
        description: "CAPTCHA : Bernard ne saura jamais le résoudre."

  # ==========================================
  # Mails de crise (Kouraks = 0)
  # ==========================================

  - id: mail-zero-kouraks-1
    name: "⚠️ ALERTE : Kouraks à zéro"
    description: |
      <p>QUOI ?! Comment on peut être à 0 Kouraks ?!</p>
      <p>Les serveurs tournent. Les projets sont en ligne. Et on ne gagne RIEN ?</p>
      <p>Vérifiez la config. Redémarrez les services. Faites quelque chose !</p>
      <p>J'ai débloqué un prêt d'urgence. 80 000 K. Taux d'intérêt : préférez ne pas savoir.</p>
      <p>C'est la première et dernière fois.</p>
      <p class="mail-signature">— JM (pas content)</p>
    from: "Jean-Michel Kouratec <jm@kouratech.com>"
    unlockAtEvent: zero_kouraks
    eventId: zero_kouraks_1
    options:
      - id: zero-1-ok
        name: "Je règle le problème"
        description: "Prêt d'urgence, taux d'intérêt d'urgence."

  - id: mail-zero-kouraks-2
    name: "⚠️⚠️ RE: Kouraks à zéro ENCORE"
    description: |
      <p>C'EST PAS POSSIBLE.</p>
      <p>On repassé à 0K. DEUX FOIS. EN UN MOIS.</p>
      <p>J'ai appelé un consultant McKinsey. Il a analysé l'infra pendant 3 heures. Facture : 15 000€.</p>
      <p>Sa recommandation : "Supprimer 2 services au hasard pour optimiser les coûts."</p>
      <p>Il l'a fait. Maintenant les projets crashent. Mais au moins on économise de l'argent.</p>
      <p>Réparez ça.</p>
      <p class="mail-signature">— JM (très pas content)</p>
    from: "Jean-Michel Kouratec <jm@kouratech.com>"
    unlockAtEvent: zero_kouraks_2
    eventId: zero_kouraks_2
    options:
      - id: zero-2-ok
        name: "Je vais tout réparer"
        description: "Consultant McKinsey, crash garanti."

  - id: mail-zero-kouraks-3-gameover
    name: "C'est terminé"
    description: |
      <p>Trois fois à 0 Kouraks. TROIS.</p>
      <p>J'ai pris une décision difficile. L'infrastructure sera externalisée.</p>
      <p>J'ai signé un contrat avec une ESN. Offshore. Madagascar. 6 ingénieurs à 800€/mois chacun.</p>
      <p>Ils commencent lundi. Votre dernier jour est vendredi.</p>
      <p>Merci pour votre service. Les RH vous contacteront pour la procédure.</p>
      <p>PS : Le site de ma fille est down depuis ce matin. Vous pouvez le réparer avant de partir ?</p>
      <p class="mail-signature">— Jean-Michel Kouratec<br>CEO, KouraTech Industries</p>
    from: "Jean-Michel Kouratec <jm@kouratech.com>"
    unlockAtEvent: zero_kouraks_3
    options:
      - id: zero-gameover-lettre
        name: "Ah d'accord, vous pouvez m'écrire une lettre de recommandation ?"
        eventId: request_recommendation_letter
        description: "Lettre de recommandation, pour survivre à Madagascar."

  # ==========================================
  # Mails de strikes
  # ==========================================

  - id: mail-site-strike
    name: "Le site n'atteint pas ses objectifs"
    description: |
      <p>Les métriques du site sont en dessous des attentes.</p>
      <p>On visait 10 000 vues par jour. On en a 342. Ma fille a plus de followers Instagram que notre site a de visiteurs.</p>
      <p>C'est un avertissement. Encore un trimestre comme ça et on arrête le site.</p>
      <p class="mail-signature">— JM</p>
    from: "Jean-Michel Kouratec <jm@kouratech.com>"
    unlockAtEvent: site-vitrine-strike
    options:
      - id: site-strike-ok
        name: "Je vais optimiser"
        description: "Optimiser ou Instagrammer ?"

  - id: mail-forum-strike
    name: "Le forum ne produit pas assez"
    description: |
      <p>Le forum coûte plus cher qu'il ne rapporte.</p>
      <p>Bernard m'a envoyé un tableau Excel. C'est marqué en rouge. Beaucoup de rouge.</p>
      <p>Trouvez une solution. Ou on ferme le forum. Et Bernard sera encore moins content.</p>
      <p class="mail-signature">— JM</p>
    from: "Jean-Michel Kouratec <jm@kouratech.com>"
    unlockAtEvent: forum-strike
    options:
      - id: forum-strike-ok
        name: "Je vais améliorer les perfs"
        description: "Excel rouge, Bernard rouge, forum rouge."

  - id: mail-ecommerce-strike
    name: "La boutique ne vend rien"
    description: |
      <p>247 visiteurs. 3 ventes. Des porte-clés à 5€ pièce.</p>
      <p>Il m'en reste 4 997 dans le garage. Ma femme veut garer la voiture.</p>
      <p>Soit le site se met à vendre, soit je les balance sur Leboncoin et on oublie ce projet.</p>
      <p class="mail-signature">— JM</p>
    from: "Jean-Michel Kouratec <jm@kouratech.com>"
    unlockAtEvent: ecommerce-strike
    options:
      - id: ecommerce-strike-ok
        name: "Je vais booster les ventes"
        description: "Leboncoin, la vraie boutique KouraTech."

  # ==========================================
  # Mails de succès
  # ==========================================

  - id: mail-milestone-100k
    name: "🎉 100 000 Kouraks !"
    description: |
      <p>100 000 Kouraks de production cumulée !</p>
      <p>Je ne pensais pas qu'on y arriverait. Le comptable non plus. Ma femme m'avait conseillé d'arrêter.</p>
      <p>On a prouvé qu'on avait raison. L'infrastructure, c'est rentable. Parfois.</p>
      <p>Continuez comme ça. J'ai commandé des pizzas pour l'équipe. Elles arrivent jeudi prochain.</p>
      <p class="mail-signature">— JM (content)</p>
    from: "Jean-Michel Kouratec <jm@kouratech.com>"
    unlockAtTrimester: 5.0
    options:
      - id: milestone-100k-ok
        name: "Merci chef !"
        description: "Pizza jeudi prochain, si le site tient jusque-là."

  - id: mail-milestone-1M
    name: "🎉 1 Million de Kouraks !"
    description: |
      <p>UN MILLION !</p>
      <p>J'ai fait un screenshot pour le mettre sur LinkedIn. 847 likes. Bernard est jaloux.</p>
      <p>On scale. On itère. On disrupte. J'ai tous les mots du business à la mode.</p>
      <p>Les investisseurs commencent à appeler. Série A en vue. Valorisation : 50M. On va être riches.</p>
      <p>Enfin... moi surtout. Vous aurez une prime. Symbolique.</p>
      <p class="mail-signature">— JM (très content)</p>
    from: "Jean-Michel Kouratec <jm@kouratech.com>"
    unlockAtTrimester: 10.0
    options:
      - id: milestone-1M-ok
        name: "On continue !"
        description: "Prime symbolique, screenshot LinkedIn."

  - id: mail-milestone-10M
    name: "🎉 10 Millions de Kouraks !"
    description: |
      <p>DIX MILLIONS DE KOURAKS.</p>
      <p>On est dans le top 100 des scale-ups françaises. Forbes veut faire un article.</p>
      <p>J'ai dit oui. Interview prévue mardi. J'ai acheté un nouveau costume. Hugo Boss. 2 400€.</p>
      <p>Tout ça grâce à notre infra solide. Enfin... solide... ça crash souvent quand même. Mais ça scale.</p>
      <p class="mail-signature">— JM (euphorique)</p>
    from: "Jean-Michel Kouratec <jm@kouratech.com>"
    unlockAtTrimester: 15.0
    options:
      - id: milestone-10M-ok
        name: "On est des champions"
        description: "Hugo Boss, crash boss, scale boss."

