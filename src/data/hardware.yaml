# Notes de conception:
# - Chaque trimestre = 6 minutes de jeu réel
# - unlockAtTrimester en float permet un déblocage continu
# - deployCost = 0 indique une location (recurringCost élevé)
# - yieldMultiplier reflète la puissance relative du hardware
# - maximumYield = capacité max avant throttling
# - crashRate très faible pour hardware (surtout vs services)
# - Les hardware gaming ont crashRate plus élevé et recurringCost élevé
# - Les VPS ont deployTime court mais maximumYield limité
# - Les dédiés ont deployTime long (provisioning) mais bon rapport
