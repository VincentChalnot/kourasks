<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KOURAKS</title>

  <!-- js-yaml must load synchronously before the game script parses YAML -->
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
  <!-- Alpine.js deferred so inline scripts can register Alpine.data first -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <!-- Pico.css classless variant — styles native HTML elements, no class changes needed -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css">

  <style>
    /* Hide elements marked x-cloak until Alpine initialises */
    [x-cloak] { display: none !important; }

    /* ── Header / Kouraks Counter ──────────────────────────────── */
    .header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 16px 24px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
    }
    .header-title {
      font-size: 24px;
      font-weight: 700;
      color: #58a6ff;
      margin-right: 16px;
    }
    .kouraks-display {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex: 1;
    }
    #kouraks-count {
      font-size: 32px;
      font-weight: 700;
      color: #f0f6fc;
      font-variant-numeric: tabular-nums;
    }
    #kouraks-rate {
      font-size: 16px;
      color: #3fb950;
      font-variant-numeric: tabular-nums;
    }
    .hardware-info {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #8b949e;
    }
    .hardware-info strong { color: #c9d1d9; }
    #hardware-mult {
      color: #d2a8ff;
      font-weight: 600;
    }
    #hardware-upgrade-btn {
      background: #238636;
      color: #fff;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
    }
    #hardware-upgrade-btn:hover:not(:disabled) { background: #2ea043; }
    #hardware-upgrade-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Main Layout ───────────────────────────────────────────── */
    .main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      min-height: calc(100vh - 160px);
    }

    /* ── Panels ────────────────────────────────────────────────── */
    .panel {
      padding: 16px;
      overflow-y: auto;
    }
    .panel:first-child {
      border-right: 1px solid #30363d;
    }
    .panel-title {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      color: #8b949e;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #21262d;
    }

    /* ── Project Cards ─────────────────────────────────────────── */
    .project-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      transition: border-color 0.15s;
    }
    .project-card:hover { border-color: #58a6ff; }
    .project-card.locked {
      opacity: 0.5;
      border-color: #21262d;
    }
    .project-card.locked:hover { border-color: #21262d; }
    .project-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }
    .project-name {
      font-weight: 600;
      color: #f0f6fc;
    }
    .project-yield {
      font-size: 14px;
      font-weight: 600;
      color: #3fb950;
      font-variant-numeric: tabular-nums;
    }
    .project-reqs {
      margin-top: 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .req-badge {
      font-size: 12px;
      background: #21262d;
      padding: 2px 8px;
      border-radius: 12px;
      white-space: nowrap;
    }
    .project-desc {
      font-size: 12px;
      color: #8b949e;
      font-style: italic;
      margin-top: 6px;
    }
    .project-detail {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #21262d;
    }
    .detail-title {
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 4px;
    }
    .detail-empty {
      font-size: 12px;
      color: #484f58;
      font-style: italic;
    }
    .assigned-service {
      font-size: 13px;
      padding: 2px 0;
    }

    /* ── Service Cards ─────────────────────────────────────────── */
    .service-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
    }
    .service-card.status-crashed { border-left: 3px solid #f85149; }
    .service-card.status-degraded { border-left: 3px solid #d29922; }
    .service-card.status-green { border-left: 3px solid #3fb950; }
    .service-header {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .service-name {
      font-weight: 600;
      color: #f0f6fc;
    }
    .service-type-badge {
      font-size: 11px;
      background: #21262d;
      color: #8b949e;
      padding: 1px 6px;
      border-radius: 10px;
      margin-left: auto;
    }
    .service-assignment {
      margin-top: 6px;
    }
    .service-assignment label {
      font-size: 13px;
      color: #8b949e;
    }
    .service-assignment select {
      background: #0d1117;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 3px 6px;
      font-size: 12px;
      margin-left: 4px;
    }
    .service-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 6px;
    }
    .assigned-to {
      font-size: 12px;
      color: #8b949e;
    }
    .restart-timer {
      font-size: 12px;
      color: #d29922;
    }

    /* ── Buttons ────────────────────────────────────────────────── */
    .btn {
      border: none;
      border-radius: 6px;
      padding: 5px 12px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-restart {
      background: #da3633;
      color: #fff;
    }
    .btn-restart:hover:not(:disabled) { background: #f85149; }
    .btn-buy {
      background: #238636;
      color: #fff;
    }
    .btn-buy:hover:not(:disabled) { background: #2ea043; }
    .btn-shop {
      background: #1f6feb;
      color: #fff;
      width: 100%;
      padding: 10px;
      font-size: 14px;
      margin-top: 8px;
    }
    .btn-shop:hover { background: #388bfd; }
    .btn-reset {
      background: #21262d;
      color: #8b949e;
      font-size: 12px;
      padding: 4px 10px;
    }
    .btn-reset:hover { background: #30363d; color: #c9d1d9; }

    /* ── Shop Modal ────────────────────────────────────────────── */
    .modal-overlay {
      display: flex;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .modal {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      width: 90%;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 24px;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .modal-title {
      font-size: 18px;
      font-weight: 700;
      color: #f0f6fc;
    }
    .modal-close {
      background: none;
      border: none;
      color: #8b949e;
      font-size: 24px;
      cursor: pointer;
      padding: 0 4px;
    }
    .modal-close:hover { color: #f0f6fc; }

    /* ── Shop Items ────────────────────────────────────────────── */
    .shop-group {
      margin-bottom: 16px;
    }
    .shop-group-title {
      font-size: 14px;
      color: #d2a8ff;
      font-weight: 600;
      margin-bottom: 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid #21262d;
    }
    .shop-item {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 6px;
    }
    .shop-item.locked {
      opacity: 0.4;
    }
    .shop-item.too-expensive {
      opacity: 0.7;
    }
    .shop-item-name {
      font-weight: 600;
      color: #f0f6fc;
      font-size: 14px;
    }
    .shop-item-desc {
      font-size: 12px;
      color: #8b949e;
      font-style: italic;
      margin-top: 2px;
    }
    .shop-item-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
    }
    .shop-cost {
      color: #d29922;
      font-weight: 600;
      font-size: 14px;
    }

    /* ── Event Log ─────────────────────────────────────────────── */
    .log-panel {
      background: #0d1117;
      border-top: 1px solid #30363d;
      padding: 12px 24px;
      max-height: 200px;
      overflow-y: auto;
    }
    .log-panel .panel-title {
      margin-bottom: 8px;
    }
    .log-entry {
      font-size: 13px;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      color: #8b949e;
      padding: 1px 0;
      line-height: 1.5;
    }
    .empty-message {
      font-size: 13px;
      color: #484f58;
      font-style: italic;
      padding: 8px 0;
    }

    /* ── Footer ────────────────────────────────────────────────── */
    .footer {
      background: #161b22;
      border-top: 1px solid #30363d;
      padding: 8px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #484f58;
    }

    /* ── Deploy Popup ──────────────────────────────────────────── */
    .deploy-popup {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      width: 90%;
      max-width: 520px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 24px;
    }
    .deploy-section {
      margin-bottom: 14px;
    }
    .deploy-label {
      font-size: 12px;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .deploy-value {
      font-size: 14px;
      color: #f0f6fc;
    }
    .deploy-price-row {
      display: flex;
      gap: 24px;
      margin-bottom: 14px;
    }
    .deploy-price-item {
      flex: 1;
    }
    .deploy-price-value {
      font-size: 16px;
      font-weight: 600;
      color: #d29922;
      font-variant-numeric: tabular-nums;
    }
    .deploy-krate-value {
      font-size: 16px;
      font-weight: 600;
      color: #3fb950;
      font-variant-numeric: tabular-nums;
    }
    .deploy-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #21262d;
    }
    .btn-cancel {
      background: #21262d;
      color: #c9d1d9;
    }
    .btn-cancel:hover { background: #30363d; }
    .btn-confirm {
      background: #238636;
      color: #fff;
    }
    .btn-confirm:hover:not(:disabled) { background: #2ea043; }
    .deploy-select {
      width: 100%;
      background: #0d1117;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 6px 8px;
      font-size: 13px;
      margin-top: 4px;
    }
    .deploy-desc {
      font-size: 13px;
      color: #8b949e;
      font-style: italic;
      line-height: 1.5;
    }

    /* ── Milestone Popup ───────────────────────────────────────── */
    .milestone-popup {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: #1f6feb;
      color: #fff;
      padding: 16px 32px;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 600;
      z-index: 200;
      opacity: 0;
      transition: transform 0.5s ease, opacity 0.5s ease;
      text-align: center;
      max-width: 90%;
      box-shadow: 0 4px 24px rgba(31,111,235,0.4);
    }
    .milestone-popup.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body x-data="game">

  <!-- Header -->
  <div class="header">
    <span class="header-title">🖥 KOURAKS</span>
    <div class="kouraks-display">
      <span id="kouraks-count" x-text="fmt(kouraks) + ' K'">0 K</span>
      <span id="kouraks-rate" x-text="'(+' + fmt(rate) + ' K/s)'"></span>
    </div>
    <div class="hardware-info">
      Hardware : <strong x-text="hardwareConfig.name"></strong>
      <span id="hardware-mult" x-text="'×' + hardwareConfig.multiplier"></span>
      <button id="hardware-upgrade-btn"
              x-show="nextHardware"
              :disabled="kouraks < (nextHardware ? nextHardware.cost : Infinity)"
              @click="upgradeHardware()"
              x-text="nextHardware ? 'Upgrader → ' + nextHardware.name + ' (' + fmt(nextHardware.cost) + ' K)' : ''">
      </button>
    </div>
  </div>

  <!-- Main Panels -->
  <div class="main">

    <!-- Projects Panel -->
    <div class="panel">
      <div class="panel-title">Projets en prod</div>
      <div id="projects-list">
        <div class="empty-message" x-show="unlockedLeaves.length === 0">Aucun projet disponible pour le moment.</div>
        <template x-for="leaf in unlockedLeaves" :key="leaf.id">
          <div class="project-card">
            <div class="project-header" @click="toggleDetail(leaf.id)">
              <span class="project-name" x-text="leaf.name"></span>
              <span class="project-yield" x-text="fmt(computeLeafYield(leaf)) + ' K/s'"></span>
            </div>
            <div class="project-reqs">
              <template x-for="reqType in leaf.requires" :key="reqType">
                <span class="req-badge"
                      :title="typeLabel(reqType) + ': ' + reqStatus(leaf, reqType).label"
                      x-text="reqStatus(leaf, reqType).icon + ' ' + typeLabel(reqType)">
                </span>
              </template>
            </div>
            <div class="project-desc" x-text="leaf.description"></div>
            <div class="project-detail" x-show="openDetails[leaf.id]">
              <div class="detail-title">Services assignés :</div>
              <div class="detail-empty" x-show="leafAssigned(leaf).length === 0">Aucun service assigné.</div>
              <template x-for="svc in leafAssigned(leaf)" :key="svc.uid">
                <div class="assigned-service">
                  <span x-text="statusIcon(svc.status) + ' ' + svc.name"></span>
                  <span class="service-type-badge" x-text="typeLabel(svc.serviceType)"></span>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>
    </div>

    <!-- Services Panel -->
    <div class="panel">
      <div class="panel-title">Services disponibles</div>
      <div id="services-list">
        <div class="empty-message" x-show="ownedServices.length === 0">Aucun service. Achetez-en dans la boutique.</div>
        <template x-for="svc in ownedServices" :key="svc.uid">
          <div class="service-card" :class="'status-' + svc.status">
            <div class="service-header">
              <span x-text="statusIcon(svc.status)"></span>
              <span class="service-name" x-text="svc.name"></span>
              <span class="service-type-badge" x-text="typeLabel(svc.serviceType)"></span>
            </div>
            <div class="service-assignment">
              <label>Assigner à :
                <select x-model="svc.assignedTo">
                  <option value="">— Non assigné —</option>
                  <template x-for="leaf in unlockedLeaves" :key="leaf.id">
                    <option :value="leaf.id" x-text="leaf.name"></option>
                  </template>
                </select>
              </label>
            </div>
            <div class="service-info">
              <span class="assigned-to"
                    x-text="svc.assignedTo ? (config.leaves.find(l => l.id === svc.assignedTo) || {name: ''}).name : 'Non assigné'">
              </span>
              <button class="btn btn-restart"
                      x-show="svc.status === 'crashed'"
                      @click="restartService(svc.uid)">Redémarrer</button>
              <span class="restart-timer"
                    x-show="svc.status === 'degraded'"
                    x-text="'Redémarrage… ' + svc.restartTimer + 's'"></span>
            </div>
          </div>
        </template>
      </div>
      <button class="btn btn-shop" @click="shopOpen = true">🚀 Déployer un service</button>
    </div>

  </div>

  <!-- Event Log -->
  <div class="log-panel">
    <div class="panel-title">Log système</div>
    <div id="log-list">
      <template x-for="entry in eventLog.slice(0, 20)" :key="entry._id">
        <div class="log-entry" x-text="'[' + entry.time + '] ' + entry.message"></div>
      </template>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span>KOURAKS — Infrastructure absurde depuis 2019</span>
    <button class="btn btn-reset" @click="confirmReset()">Réinitialiser</button>
  </div>

  <!-- Shop Modal — x-cloak prevents flash before Alpine initialises -->
  <div class="modal-overlay" x-show="shopOpen" x-cloak @click.self="shopOpen = false">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">🚀 Marketplace de services</span>
        <button class="modal-close" @click="shopOpen = false">✕</button>
      </div>
      <div id="shop-content">
        <template x-for="group in shopGroups" :key="group.type">
          <div class="shop-group" x-show="group.services.length > 0">
            <h3 class="shop-group-title" x-text="typeLabel(group.type)"></h3>
            <template x-for="svc in group.services" :key="svc.id">
              <div class="shop-item"
                   :class="kouraks < svc.buyCost ? 'too-expensive' : ''">
                <div class="shop-item-name" x-text="svc.name"></div>
                <div class="shop-item-desc" x-text="svc.description"></div>
                <div class="shop-item-info">
                  <span class="shop-cost" x-text="fmt(svc.buyCost) + ' K'"></span>
                  <button class="btn btn-buy"
                          :disabled="kouraks < svc.buyCost"
                          @click="openDeploy(svc.id)">Déployer</button>
                </div>
              </div>
            </template>
          </div>
        </template>
      </div>
    </div>
  </div>

  <!-- Deploy Configuration Popup -->
  <div class="modal-overlay" x-show="deployOpen" x-cloak @click.self="cancelDeploy()">
    <div class="deploy-popup" x-show="deployConfig">
      <div class="modal-header">
        <span class="modal-title">🚀 Déployer un service</span>
        <button class="modal-close" @click="cancelDeploy()">✕</button>
      </div>

      <template x-if="deployConfig">
        <div>
          <!-- Service name & type -->
          <div class="deploy-section">
            <div class="deploy-label">Service</div>
            <div class="deploy-value">
              <strong x-text="deployConfig.name"></strong>
              <span class="service-type-badge" x-text="typeLabel(deployConfig.serviceType)"></span>
            </div>
          </div>

          <!-- Description -->
          <div class="deploy-section">
            <div class="deploy-label">Description</div>
            <div class="deploy-desc" x-text="deployConfig.description"></div>
          </div>

          <!-- Pricing row -->
          <div class="deploy-price-row">
            <div class="deploy-price-item">
              <div class="deploy-label">Prix fixe</div>
              <div class="deploy-price-value" x-text="fmt(deployConfig.buyCost) + ' K'"></div>
            </div>
            <div class="deploy-price-item">
              <div class="deploy-label">Coût récurrent</div>
              <div class="deploy-price-value"
                   x-text="deployConfig.recurringCost > 0 ? fmt(deployConfig.recurringCost) + ' K/s' : 'Gratuit'"></div>
            </div>
            <div class="deploy-price-item">
              <div class="deploy-label">K/s potentiel</div>
              <div class="deploy-krate-value"
                   x-text="deployProjectId ? '+' + fmt(potentialYield(deployConfig, deployProjectId)) + ' K/s' : '—'"></div>
            </div>
          </div>

          <!-- Project selection -->
          <div class="deploy-section">
            <div class="deploy-label">Assigner au projet</div>
            <select class="deploy-select" x-model="deployProjectId">
              <option value="">— Aucun projet —</option>
              <template x-for="leaf in unlockedLeaves" :key="leaf.id">
                <option :value="leaf.id" x-text="leaf.name"></option>
              </template>
            </select>
          </div>

          <!-- Hardware info -->
          <div class="deploy-section">
            <div class="deploy-label">Infrastructure hardware</div>
            <div class="deploy-value">
              <strong x-text="hardwareConfig.name"></strong>
              <span style="color:#d2a8ff; margin-left:8px" x-text="'×' + hardwareConfig.multiplier"></span>
            </div>
          </div>

          <!-- Actions -->
          <div class="deploy-actions">
            <button class="btn btn-cancel" @click="cancelDeploy()">Annuler</button>
            <button class="btn btn-confirm"
                    :disabled="kouraks < deployConfig.buyCost"
                    @click="confirmDeploy()">
              Confirmer le déploiement
            </button>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- ── Game data as inline YAML ─────────────────────────────────────────── -->
  <script type="text/yaml" id="game-data">
hardware:
  - level: 1
    name: "Vieux Delleau Reconditionné"
    cost: 0
    multiplier: 1.0
  - level: 2
    name: "Serveur Marmolaye 2U"
    cost: 500
    multiplier: 1.5
  - level: 3
    name: "Rack Glandesque 42U"
    cost: 2500
    multiplier: 2.5
  - level: 4
    name: "Cluster Talgoya"
    cost: 12000
    multiplier: 5.0
  - level: 5
    name: "Datacenter Akwéneau Piscine"
    cost: 80000
    multiplier: 12.0

serviceTypeLabels:
  backend: "Backend"
  database: "Base de données"
  message-queue: "Message Queue"
  cache: "Cache"
  reverse-proxy: "Reverse Proxy"
  search: "Recherche"
  iam: "IAM"
  bundler: "Bundler"
  </script>

  <!-- ── Game engine as Alpine.js component ───────────────────────────────── -->
  <script>
    // Parse YAML config at startup — GAME_CONFIG is available globally
    const GAME_CONFIG = jsyaml.load(document.getElementById('game-data').textContent);

    document.addEventListener('alpine:init', () => {
      Alpine.data('game', () => ({
        // ── State ────────────────────────────────────────────────
        config: GAME_CONFIG,
        kouraks: 500,   // New players start with 500 K; reset goes to 0 (intentional, original design)
        totalEarned: 0,
        hardwareLevel: 1,
        ownedServices: [],
        eventLog: [],
        nextUid: 1,
        _logCounter: 0,
        milestonesReached: [],
        shopOpen: false,
        deployOpen: false,
        deployConfig: null,
        deployProjectId: '',
        // Pre-initialise all leaf detail toggles to false
        openDetails: Object.fromEntries(GAME_CONFIG.leaves.map(l => [l.id, false])),

        // ── Lifecycle ────────────────────────────────────────────
        init() {
          const loaded = this.loadGame();
          if (!loaded) {
            this.addLog("Bienvenue. Le système est opérationnel. Pour l'instant.");
          }
          setInterval(() => this.gameTick(), 1000);
          setInterval(() => this.saveGame(), 30000);
        },

        // ── Computed getters ─────────────────────────────────────
        get hardwareConfig() {
          return this.config.hardware.find(h => h.level === this.hardwareLevel)
              || this.config.hardware[0];
        },
        get nextHardware() {
          return this.config.hardware.find(h => h.level === this.hardwareLevel + 1) || null;
        },
        get rate() {
          return this.computeTotalRate();
        },
        get unlockedLeaves() {
          return this.config.leaves.filter(l => this.totalEarned >= l.unlockAt);
        },
        get shopGroups() {
          const groups = {};
          for (const svc of this.config.services) {
            if (this.totalEarned < svc.unlockAt) continue;
            if (!groups[svc.serviceType]) groups[svc.serviceType] = [];
            groups[svc.serviceType].push(svc);
          }
          return Object.entries(groups).map(([type, services]) => ({ type, services }));
        },

        // ── Formatting helpers ───────────────────────────────────
        fmt(value) {
          return Math.floor(value).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
        },
        statusIcon(status) {
          return { green: '🟢', degraded: '🟡', crashed: '🔴' }[status] || '❓';
        },
        typeLabel(type) {
          return this.config.serviceTypeLabels[type] || type;
        },

        // ── Yield calculation ────────────────────────────────────
        // Returns the best (max) yieldMultiplier for each required service type.
        // 0 means the type is unsatisfied (no service assigned or all crashed).
        bestMultipliersPerType(leaf, services) {
          return leaf.requires.map(type => {
            const ofType = services.filter(s => s.serviceType === type);
            return ofType.length ? Math.max(...ofType.map(s => s.yieldMultiplier)) : 0;
          });
        },
        computeLeafYield(leaf) {
          const hwMult = this.hardwareConfig.multiplier;
          const assigned = this.ownedServices.filter(s => s.assignedTo === leaf.id);
          const bestMults = this.bestMultipliersPerType(leaf, assigned);
          if (bestMults.some(m => m === 0)) return 0;
          return leaf.baseYield * hwMult * Math.min(...bestMults);
        },
        computeTotalRate() {
          return this.config.leaves
            .filter(l => this.totalEarned >= l.unlockAt)
            .reduce((sum, l) => sum + this.computeLeafYield(l), 0);
        },

        // ── Template helpers ─────────────────────────────────────
        leafAssigned(leaf) {
          return this.ownedServices.filter(s => s.assignedTo === leaf.id);
        },
        reqStatus(leaf, reqType) {
          const assigned = this.ownedServices.filter(s => s.assignedTo === leaf.id);
          const ofType = assigned.filter(s => s.serviceType === reqType);
          if (!ofType.length) return { icon: '❓', label: 'manque' };
          // Show the best-status service of this type (green > degraded > crashed)
          const best = ofType.reduce(
            (a, b) => b.yieldMultiplier > a.yieldMultiplier ? b : a,
            ofType[0]
          );
          return { icon: this.statusIcon(best.status), label: best.name };
        },
        toggleDetail(leafId) {
          // Spread into new object to ensure Alpine detects the change
          this.openDetails = { ...this.openDetails, [leafId]: !this.openDetails[leafId] };
        },

        // ── Game tick ────────────────────────────────────────────
        gameTick() {
          this.processCrashes();
          const r = this.computeTotalRate();
          const recurring = this.ownedServices.reduce((sum, svc) => sum + (svc.recurringCost || 0), 0);
          this.kouraks += r - recurring;
          this.totalEarned += r;
          this.checkMilestones();
          // Alpine reactivity handles DOM updates automatically — no renderUI() call needed
        },

        // ── Crash logic ──────────────────────────────────────────
        processCrashes() {
          for (const svc of this.ownedServices) {
            if (svc.status === 'green') {
              if (Math.random() < svc.crashRate) {
                svc.status = 'crashed';
                svc.yieldMultiplier = 0.0;
                this.addLog(this.randomPick(this.config.crashMessages).replace('{name}', svc.name));
                if (svc.autoRestart) {
                  svc.status = 'degraded';
                  svc.yieldMultiplier = 0.5;
                  svc.restartTimer = svc.restartDuration;
                  this.addLog(this.randomPick(this.config.restartMessages).replace('{name}', svc.name));
                }
              }
            } else if (svc.status === 'degraded') {
              svc.restartTimer--;
              if (svc.restartTimer <= 0) {
                svc.status = 'green';
                svc.yieldMultiplier = 1.0;
                svc.restartTimer = 0;
              }
            }
          }
        },

        // ── Milestones ───────────────────────────────────────────
        checkMilestones() {
          for (const m of this.config.milestones) {
            if (this.totalEarned >= m.threshold && !this.milestonesReached.includes(m.threshold)) {
              this.milestonesReached.push(m.threshold);
              this.showMilestone(m.message);
              this.addLog('🏆 ' + m.message);
            }
          }
        },
        showMilestone(message) {
          const popup = document.createElement('div');
          popup.className = 'milestone-popup';
          popup.textContent = message;
          document.body.appendChild(popup);
          requestAnimationFrame(() => popup.classList.add('show'));
          setTimeout(() => {
            popup.classList.remove('show');
            setTimeout(() => popup.remove(), 500);
          }, 4000);
        },

        // ── Service management ───────────────────────────────────
        openDeploy(configId) {
          const cfg = this.config.services.find(s => s.id === configId);
          if (!cfg) return;
          this.deployConfig = cfg;
          this.deployProjectId = '';
          this.shopOpen = false;
          this.deployOpen = true;
        },
        confirmDeploy() {
          const cfg = this.deployConfig;
          if (!cfg || this.kouraks < cfg.buyCost || this.totalEarned < cfg.unlockAt) return;
          this.kouraks -= cfg.buyCost;
          this.ownedServices.push({
            uid: this.nextUid++,
            configId: cfg.id,
            name: cfg.name,
            serviceType: cfg.serviceType,
            crashRate: cfg.crashRate,
            recurringCost: cfg.recurringCost || 0,
            restartDuration: cfg.restartDuration,
            autoRestart: cfg.autoRestart,
            status: 'green',
            assignedTo: this.deployProjectId,
            yieldMultiplier: 1.0,
            restartTimer: 0,
          });
          this.addLog(cfg.name + ' déployé.');
          this.deployOpen = false;
          this.deployConfig = null;
          this.deployProjectId = '';
        },
        cancelDeploy() {
          this.deployOpen = false;
          this.deployConfig = null;
          this.deployProjectId = '';
        },
        potentialYield(svcCfg, projectId) {
          if (!projectId || !svcCfg) return 0;
          const leaf = this.config.leaves.find(l => l.id === projectId);
          if (!leaf) return 0;
          const hwMult = this.hardwareConfig.multiplier;
          // Simulate adding the new service (only serviceType and yieldMultiplier are needed)
          const simulated = [
            ...this.ownedServices.filter(s => s.assignedTo === projectId),
            { serviceType: svcCfg.serviceType, yieldMultiplier: 1.0 },
          ];
          const bestMults = this.bestMultipliersPerType(leaf, simulated);
          if (bestMults.some(m => m === 0)) return 0;
          return leaf.baseYield * hwMult * Math.min(...bestMults);
        },
        restartService(uid) {
          const svc = this.ownedServices.find(s => s.uid === uid);
          if (!svc || svc.status !== 'crashed') return;
          svc.status = 'degraded';
          svc.yieldMultiplier = 0.5;
          svc.restartTimer = svc.restartDuration;
          this.addLog(this.randomPick(this.config.restartMessages).replace('{name}', svc.name));
        },

        // ── Hardware ─────────────────────────────────────────────
        upgradeHardware() {
          const next = this.nextHardware;
          if (!next || this.kouraks < next.cost) return;
          this.kouraks -= next.cost;
          this.hardwareLevel = next.level;
          this.addLog('Hardware amélioré : ' + next.name + ' (×' + next.multiplier + ')');
        },

        // ── Event log ────────────────────────────────────────────
        addLog(message) {
          const now = new Date();
          const time = [now.getHours(), now.getMinutes(), now.getSeconds()]
            .map(n => String(n).padStart(2, '0')).join(':');
          this.eventLog.unshift({ _id: this._logCounter++, time, message });
          if (this.eventLog.length > 100) this.eventLog.length = 100;
        },

        // ── Utilities ────────────────────────────────────────────
        randomPick(arr) {
          return arr[Math.floor(Math.random() * arr.length)];
        },

        // ── Persistence ──────────────────────────────────────────
        saveGame() {
          try {
            localStorage.setItem('kouraks-save', JSON.stringify({
              kouraks: this.kouraks,
              totalEarned: this.totalEarned,
              hardwareLevel: this.hardwareLevel,
              ownedServices: this.ownedServices,
              nextUid: this.nextUid,
              milestonesReached: this.milestonesReached,
              eventLog: this.eventLog.slice(0, 50),
            }));
          } catch (e) {
            // Silently fail if localStorage is unavailable
          }
        },
        loadGame() {
          try {
            const raw = localStorage.getItem('kouraks-save');
            if (!raw) return false;
            const d = JSON.parse(raw);
            this.kouraks = d.kouraks ?? 0;
            this.totalEarned = d.totalEarned ?? 0;
            this.hardwareLevel = d.hardwareLevel ?? 1;
            // Normalise legacy null assignedTo values to '' for x-model compatibility
            this.ownedServices = (d.ownedServices || []).map(svc => ({
              ...svc,
              assignedTo: svc.assignedTo || '',
            }));
            this.nextUid = d.nextUid ?? 1;
            this.milestonesReached = d.milestonesReached || [];
            const entries = d.eventLog || [];
            this.eventLog = entries.map((e, i) => ({ _id: i, ...e }));
            this._logCounter = entries.length;
            this.addLog('Sauvegarde chargée. Reprise en cours.');
            return true;
          } catch (e) {
            return false;
          }
        },
        confirmReset() {
          if (confirm('Réinitialiser la partie ? Toute la progression sera perdue.')) {
            localStorage.removeItem('kouraks-save');
            this.kouraks = 0;
            this.totalEarned = 0;
            this.hardwareLevel = 1;
            this.ownedServices = [];
            this.nextUid = 1;
            this._logCounter = 0;
            this.milestonesReached = [];
            this.eventLog = [];
            this.openDetails = Object.fromEntries(this.config.leaves.map(l => [l.id, false]));
            this.addLog('Système réinitialisé. Bonne chance.');
          }
        },

      }));
    });
  </script>
