# - deprecatedAtTrimester marque l'obsolescence (crashRate augmente après)
# - recurringCost négatif pour les financial services (revenus passifs)
# - Les services SaaS ont deployTime court mais recurringCost élevé
# - Les services on-prem ont deployTime long mais recurringCost = 0
# - yieldMultiplier > 1.0 pour services qui boostent la production
