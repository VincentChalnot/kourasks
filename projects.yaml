  # ==========================================
  # Projet 10 — AI/ML Platform (T13-T17+)
  # ==========================================
  - id: aiml-platform
    name: "AI/ML Platform"
    description: "Plateforme ML. Les modèles s'entraînent. Lentement. Le GPU coûte 10 000€/mois. On fait du CPU."
