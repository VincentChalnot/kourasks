# Notes de conception:
# - 10 projets principaux qui se débloquent progressivement
# - Chaque projet a 2-3 versions avec requirements croissants
# - targetProduction calculé sur base 1 trimestre = 360 secondes
# - Les versions se débloquent avec un eventId pour lier aux mails
# - serviceTypeRequirements augmente avec la complexité
# - Progression narrative: site perso → e-commerce → SaaS → fintech → IoT → AI
# - Les strikes déclenchent des événements pour les mails narratifs
# - 3 strikes = projet échoué, déclenche failureEventId
# - Au T17, le joueur gère ~10 projets simultanément (pic de complexité)
