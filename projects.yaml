# KOURASKS - Configuration Projects
# Projets avec leurs versions qui se débloquent progressivement
# Chaque trimestre = 6 minutes = 360 secondes de jeu
# targetProduction = K à produire sur 1 trimestre pour éviter un strike

projects:
  # ==========================================
  # Projet 1 — Site Vitrine Personnel (T0-T2)
  # ==========================================
  - id: site-vitrine
    name: "Site Vitrine Personnel"
    description: "Le site web du PDG. HTML statique. 3 pages. Il veut des stats de visite en temps réel."
    strikeEventId: site-vitrine-strike
    failureEventId: site-vitrine-failed
    versions:
      - id: site-vitrine-v1
        name: "v1.0"
        version: "v1.0"
        unlockAtTrimester: 0
        eventId: site-vitrine-v1-launched
        targetProduction: 1800  # ~5 K/s minimum sur 360s
        serviceTypeRequirements: ['backend']
        serviceRequirements: []

      - id: site-vitrine-v1.5
        name: "v1.5"
        version: "v1.5"
        unlockAtTrimester: 1.5
        eventId: site-vitrine-v15-launched
        targetProduction: 3600  # ~10 K/s, besoin d'upgrade hardware
        serviceTypeRequirements: ['backend', 'reverse-proxy']
        serviceRequirements: []

  # ==========================================
  # Projet 2 — Forum Community (T1.5-T4)
  # ==========================================
  - id: forum-community
    name: "Forum Community"
    description: "Forum phpBB. Les utilisateurs râlent. Le modérateur est débordé. Les spammeurs sont contents."
    strikeEventId: forum-strike
    failureEventId: forum-failed
    versions:
      - id: forum-v1
        name: "v1.0"
        version: "v1.0"
        unlockAtTrimester: 1.5
        eventId: forum-v1-launched
        targetProduction: 4500  # Besoin backend + database
        serviceTypeRequirements: ['backend', 'database']
        serviceRequirements: []

      - id: forum-v2
        name: "v2.0"
        version: "v2.0"
        unlockAtTrimester: 3.5
        eventId: forum-v2-launched
        targetProduction: 12000  # Migration forcée, + storage
        serviceTypeRequirements: ['backend', 'database', 'storage']
        serviceRequirements: []

  # ==========================================
  # Projet 3 — E-commerce Boutique (T2.5-T6)
  # ==========================================
  - id: ecommerce-boutique
    name: "E-commerce Boutique"
    description: "Boutique en ligne. Paiement CB. Le tunnel de conversion fait 7 étapes. Personne ne comprend pourquoi."
    strikeEventId: ecommerce-strike
    failureEventId: ecommerce-failed
    versions:
      - id: ecommerce-v1
        name: "v1.0"
        version: "v1.0"
        unlockAtTrimester: 2.5
        eventId: ecommerce-v1-launched
        targetProduction: 18000  # Stack complète
        serviceTypeRequirements: ['backend', 'database', 'email']
        serviceRequirements: []

      - id: ecommerce-v2
        name: "v2.0"
        version: "v2.0"
        unlockAtTrimester: 5.0
        eventId: ecommerce-v2-launched
        targetProduction: 45000  # + cache obligatoire
        serviceTypeRequirements: ['backend', 'database', 'cache', 'email']
        serviceRequirements: []

  # ==========================================
  # Projet 4 — SaaS Gestion Projet (T4-T7.5)
  # ==========================================
  - id: saas-gestion
    name: "SaaS Gestion de Projet"
    description: "Clone de Jira. En moins bien. Les tickets se perdent. On appelle ça une 'feature' de gestion agile."
    strikeEventId: saas-strike
